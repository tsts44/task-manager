<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理アプリ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .input-area input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input[type="text"]:focus {
      border-color: #4f8ef7;
    }

    .date-area {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .date-area label {
      font-size: 0.85rem;
      color: #888;
      white-space: nowrap;
    }

    .date-area input[type="date"] {
      padding: 6px 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    .date-area input[type="date"]:focus {
      border-color: #4f8ef7;
    }

    .input-area button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover {
      background: #3a7de0;
    }

    .task-count {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #f8f9fb;
      transition: background 0.2s;
    }

    li:hover {
      background: #eef1f7;
    }

    li.done .task-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .task-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .due-date {
      font-size: 0.78rem;
      color: #888;
    }

    .due-date.overdue {
      color: #e53935;
      font-weight: bold;
    }

    .due-date.soon {
      color: #f57c00;
      font-weight: bold;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4f8ef7;
    }

    .task-text {
      flex: 1;
      font-size: 1rem;
      color: #333;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    .delete-btn:hover {
      color: #e53935;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 0.95rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>タスク管理</h1>
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="新しいタスクを入力..." />
      <button onclick="addTask()">追加</button>
    </div>
    <div class="date-area">
      <label for="dueDateInput">期限日：</label>
      <input type="date" id="dueDateInput" />
    </div>
    <div class="task-count" id="taskCount"></div>
    <ul id="taskList"></ul>
    <p class="empty" id="emptyMsg">タスクがありません</p>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function render() {
      const list = document.getElementById('taskList');
      const emptyMsg = document.getElementById('emptyMsg');
      const taskCount = document.getElementById('taskCount');

      list.innerHTML = '';

      if (tasks.length === 0) {
        emptyMsg.style.display = 'block';
        taskCount.textContent = '';
        return;
      }

      emptyMsg.style.display = 'none';
      const remaining = tasks.filter(t => !t.done).length;
      taskCount.textContent = `残り ${remaining} / ${tasks.length} 件`;

      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        if (task.done) li.classList.add('done');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = task.done;
        checkbox.onchange = () => toggleTask(index);

        const info = document.createElement('div');
        info.className = 'task-info';

        const span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = task.text;
        info.appendChild(span);

        if (task.dueDate) {
          const due = document.createElement('span');
          due.className = 'due-date';
          const today = new Date(); today.setHours(0,0,0,0);
          const dueDay = new Date(task.dueDate + 'T00:00:00');
          const diff = Math.ceil((dueDay - today) / 86400000);
          if (diff < 0) {
            due.classList.add('overdue');
            due.textContent = `期限切れ（${task.dueDate}）`;
          } else if (diff <= 2) {
            due.classList.add('soon');
            due.textContent = `期限：${task.dueDate}（あと${diff}日）`;
          } else {
            due.textContent = `期限：${task.dueDate}`;
          }
          info.appendChild(due);
        }

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '✕';
        deleteBtn.onclick = () => deleteTask(index);

        li.appendChild(checkbox);
        li.appendChild(info);
        li.appendChild(deleteBtn);
        list.appendChild(li);
      });
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      const dueDate = document.getElementById('dueDateInput').value;
      tasks.push({ text, done: false, dueDate: dueDate || null });
      save();
      render();
      input.value = '';
      document.getElementById('dueDateInput').value = '';
      input.focus();
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      save();
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      save();
      render();
    }

    document.getElementById('taskInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
